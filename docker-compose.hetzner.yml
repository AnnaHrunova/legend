services:
  legend-frontend:
    image: ghcr.io/annahrunova/legend-frontend:latest
    container_name: legend-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      HETZNER_DOMAIN: ${HETZNER_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
      VOICE_API_UPSTREAM: legend-voice-api:8787
      CADDY_BASIC_AUTH_USER: ${CADDY_BASIC_AUTH_USER}
      CADDY_BASIC_AUTH_HASH: ${CADDY_BASIC_AUTH_HASH}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - legend-voice-api

  legend-postgres:
    image: postgres:16-alpine
    container_name: legend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legend_voice
      POSTGRES_USER: legend_voice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legend_voice_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  legend-voice-api:
    image: ghcr.io/annahrunova/legend-voice-api:latest
    container_name: legend-voice-api
    restart: unless-stopped
    environment:
      VOICE_API_PORT: 8787
      DATABASE_URL: postgres://legend_voice:${POSTGRES_PASSWORD:-legend_voice_dev_password}@legend-postgres:5432/legend_voice
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-legend-voice-agent}
      CODEX_AUTH_JSON: /run/codex/auth.json
      CODEX_BACKEND_BASE_URL: ${CODEX_BACKEND_BASE_URL:-https://chatgpt.com/backend-api/codex}
      STATUS_ASSIST_MODEL: ${STATUS_ASSIST_MODEL:-gpt-5.5}
    volumes:
      - ${CODEX_AUTH_JSON_HOST:-/var/lib/codex-nexus/auth.json}:/run/codex/auth.json:rw
    depends_on:
      - legend-postgres

  legend-voice-agent:
    image: ghcr.io/annahrunova/legend-voice-agent:latest
    container_name: legend-voice-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-legend-voice-agent}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2}
      OPENAI_REALTIME_VOICE: ${OPENAI_REALTIME_VOICE:-coral}

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
