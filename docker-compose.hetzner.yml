services:
  legend-frontend:
    image: ghcr.io/annahrunova/legend-frontend:latest
    container_name: legend-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      HETZNER_DOMAIN: ${HETZNER_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
      VOICE_API_UPSTREAM: legend-voice-api:8787
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - legend-voice-api

  legend-voice-api:
    image: ghcr.io/annahrunova/legend-voice-api:latest
    container_name: legend-voice-api
    restart: unless-stopped
    environment:
      VOICE_API_PORT: 8787
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-legend-voice-agent}

  legend-voice-agent:
    image: ghcr.io/annahrunova/legend-voice-agent:latest
    container_name: legend-voice-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-legend-voice-agent}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_REALTIME_VOICE: ${OPENAI_REALTIME_VOICE:-coral}

volumes:
  caddy_data:
  caddy_config:
