name: Legend AI Zendesk Agent

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Repo branch containing the agent runner'
        required: true
        default: 'codex/ai-zendesk-agent'
      base_url:
        description: 'Legend app URL to audit'
        required: true
        default: 'https://app.legenddesk.com'
      mode:
        description: 'Agent mode'
        required: true
        default: 'triage'
      model:
        description: 'OpenAI model override. Defaults to OPENAI_MODEL secret or gpt-5.5.'
        required: false
        default: ''
      max_steps:
        description: 'Exploration steps, 1-20'
        required: true
        default: '8'

permissions:
  contents: read

concurrency:
  group: legend-ai-zendesk-agent
  cancel-in-progress: false

env:
  HETZNER_USER: deploy
  HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}
  LEGEND_AGENT_ROOT: /opt/legend/ai-zendesk-agent
  LEGEND_AGENT_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ "${MODE}" != "triage" ]; then
            echo "Only triage mode is supported."
            exit 1
          fi
          if ! [[ "${MAX_STEPS}" =~ ^[0-9]+$ ]] || [ "${MAX_STEPS}" -lt 1 ] || [ "${MAX_STEPS}" -gt 20 ]; then
            echo "max_steps must be an integer from 1 to 20."
            exit 1
          fi
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY GitHub Actions secret is required."
            exit 1
          fi
        env:
          MODE: ${{ inputs.mode }}
          MAX_STEPS: ${{ inputs.max_steps }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keygen -lf ~/.ssh/hetzner_deploy
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Prepare runner files on Hetzner
        run: |
          set -euo pipefail
          OPENAI_MODEL_VALUE="${INPUT_MODEL:-${OPENAI_MODEL_SECRET:-gpt-5.5}}"

          mkdir -p "${RUNNER_TEMP}/legend-ai"
          {
            printf 'OPENAI_API_KEY=%s\n' "${OPENAI_API_KEY}"
            printf 'OPENAI_MODEL=%s\n' "${OPENAI_MODEL_VALUE}"
          } > "${RUNNER_TEMP}/legend-ai/legend-ai-zendesk-agent.env"

          {
            printf 'LEGEND_AGENT_BRANCH=%q\n' "${INPUT_BRANCH}"
            printf 'LEGEND_AGENT_BASE_URL=%q\n' "${INPUT_BASE_URL}"
            printf 'LEGEND_AGENT_MODE=%q\n' "${INPUT_MODE}"
            printf 'LEGEND_AGENT_MODEL=%q\n' "${OPENAI_MODEL_VALUE}"
            printf 'LEGEND_AGENT_MAX_STEPS=%q\n' "${INPUT_MAX_STEPS}"
            printf 'LEGEND_AGENT_RUN_ID=%q\n' "${LEGEND_AGENT_RUN_ID}"
            printf 'LEGEND_AGENT_ROOT=%q\n' "${LEGEND_AGENT_ROOT}"
            printf 'LEGEND_AGENT_SOURCE_TGZ=%q\n' "${LEGEND_AGENT_ROOT}/source/${LEGEND_AGENT_RUN_ID}.tar.gz"
          } > "${RUNNER_TEMP}/legend-ai/run.env"

          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./.legend-ai-audits' \
            --exclude='./.env' \
            --exclude='./.env.local' \
            --exclude='./.env.*.local' \
            -czf "${RUNNER_TEMP}/legend-ai/source.tar.gz" .

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "mkdir -p '${LEGEND_AGENT_ROOT}/bin' '${LEGEND_AGENT_ROOT}/env' '${LEGEND_AGENT_ROOT}/runs' '${LEGEND_AGENT_ROOT}/logs' '${LEGEND_AGENT_ROOT}/source'"

          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            ops/hetzner/run-ai-zendesk-agent.sh \
            "${RUNNER_TEMP}/legend-ai/legend-ai-zendesk-agent.env" \
            "${RUNNER_TEMP}/legend-ai/run.env" \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/env/"

          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${RUNNER_TEMP}/legend-ai/source.tar.gz" \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/source/${LEGEND_AGENT_RUN_ID}.tar.gz"

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "mv '${LEGEND_AGENT_ROOT}/env/run-ai-zendesk-agent.sh' '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh' && chmod 700 '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh' && chmod 600 '${LEGEND_AGENT_ROOT}/env/legend-ai-zendesk-agent.env' '${LEGEND_AGENT_ROOT}/env/run.env'"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_MAX_STEPS: ${{ inputs.max_steps }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_SECRET: ${{ secrets.OPENAI_MODEL }}

      - name: Run agent on Hetzner
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "set -a && . '${LEGEND_AGENT_ROOT}/env/run.env' && set +a && '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh'"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}

      - name: Download report artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/legend-ai-result"
          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/runs/${LEGEND_AGENT_RUN_ID}.tar.gz" \
            "${RUNNER_TEMP}/legend-ai-result/latest-ai-run.tar.gz"
          tar -xzf "${RUNNER_TEMP}/legend-ai-result/latest-ai-run.tar.gz" -C "${RUNNER_TEMP}/legend-ai-result"
          {
            echo "## Legend AI Zendesk Agent"
            echo
            cat "${RUNNER_TEMP}/legend-ai-result/latest-ai-summary.md"
            echo
            echo "Full report artifact: latest-ai-report"
            echo "Hetzner run directory: ${LEGEND_AGENT_ROOT}/runs/${LEGEND_AGENT_RUN_ID}"
            echo "Hetzner log: ${LEGEND_AGENT_ROOT}/logs/${LEGEND_AGENT_RUN_ID}.log"
          } >> "${GITHUB_STEP_SUMMARY}"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-ai-report
          path: ${{ runner.temp }}/legend-ai-result
          retention-days: 14
