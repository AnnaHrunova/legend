name: Deploy to Hetzner

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'What to run'
        type: choice
        required: true
        default: deploy_frontend
        options:
          - deploy_frontend
          - run_ai_zendesk_agent
          - voice_debug
      agent_branch:
        description: 'Repo branch containing the AI Zendesk agent runner'
        required: false
        default: 'main'
      agent_base_url:
        description: 'Legend app URL to audit'
        required: false
        default: 'https://app.legenddesk.com'
      agent_mode:
        description: 'AI Zendesk agent mode'
        required: false
        default: 'triage'
      agent_model:
        description: 'Codex model override. Defaults to OPENAI_MODEL secret or gpt-5.5.'
        required: false
        default: ''
      agent_max_steps:
        description: 'AI Zendesk agent exploration steps, 1-20'
        required: false
        default: '8'

permissions:
  contents: read
  packages: write

concurrency:
  group: hetzner
  cancel-in-progress: false

env:
  FRONTEND_IMAGE_NAME: ghcr.io/annahrunova/legend-frontend
  VOICE_API_IMAGE_NAME: ghcr.io/annahrunova/legend-voice-api
  VOICE_AGENT_IMAGE_NAME: ghcr.io/annahrunova/legend-voice-agent

jobs:
  build-and-push:
    if: ${{ inputs.operation == 'deploy_frontend' || inputs.operation == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}

      - name: Build and push voice API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          target: voice-api
          push: true
          tags: |
            ${{ env.VOICE_API_IMAGE_NAME }}:latest
            ${{ env.VOICE_API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push voice agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          target: voice-agent
          push: true
          tags: |
            ${{ env.VOICE_AGENT_IMAGE_NAME }}:latest
            ${{ env.VOICE_AGENT_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    if: ${{ inputs.operation == 'deploy_frontend' || inputs.operation == '' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keygen -lf ~/.ssh/hetzner_deploy
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Verify SSH access
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            'whoami && mkdir -p /opt/legend'
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}

      - name: Copy compose file to server
        run: |
          set -euo pipefail
          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.hetzner.yml \
            "${HETZNER_USER}@${HETZNER_HOST}:/opt/legend/docker-compose.hetzner.yml"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}

      - name: Deploy on server
        run: |
          set -euo pipefail
          normalize_domain() {
            printf '%s' "$1" | tr -d '\r\n\t ' | sed -E 's#^https?://##; s#/$##'
          }

          HETZNER_DOMAIN_CLEAN="$(normalize_domain "${HETZNER_DOMAIN}")"
          if [ -z "${HETZNER_DOMAIN_CLEAN}" ]; then
            echo "HETZNER_DOMAIN is empty after normalization"
            exit 1
          fi

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "HETZNER_DOMAIN='${HETZNER_DOMAIN_CLEAN}' CADDY_EMAIL='${CADDY_EMAIL}' CADDY_BASIC_AUTH_USER='${CADDY_BASIC_AUTH_USER}' CADDY_BASIC_AUTH_HASH='${CADDY_BASIC_AUTH_HASH}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/legend

          touch .env
          chmod 600 .env

          upsert_env() {
            key="$1"
            value="$2"
            tmp_file="$(mktemp)"
            if grep -q "^${key}=" .env; then
              sed "s#^${key}=.*#${key}=${value}#" .env > "$tmp_file"
            else
              cat .env > "$tmp_file"
              printf '%s=%s\n' "$key" "$value" >> "$tmp_file"
            fi
            cat "$tmp_file" > .env
            rm -f "$tmp_file"
          }

          require_env_name() {
            key="$1"
            if ! grep -q "^${key}=" .env; then
              echo "Missing required /opt/legend/.env variable: ${key}"
              exit 1
            fi
          }

          upsert_env HETZNER_DOMAIN "$HETZNER_DOMAIN"
          upsert_env CADDY_EMAIL "$CADDY_EMAIL"
          upsert_env CADDY_BASIC_AUTH_USER "$CADDY_BASIC_AUTH_USER"
          upsert_env CADDY_BASIC_AUTH_HASH "$CADDY_BASIC_AUTH_HASH"
          if ! grep -q "^POSTGRES_PASSWORD=" .env; then
            upsert_env POSTGRES_PASSWORD "$(openssl rand -hex 24)"
          fi

          require_env_name CADDY_BASIC_AUTH_USER
          require_env_name CADDY_BASIC_AUTH_HASH
          require_env_name LIVEKIT_URL
          require_env_name LIVEKIT_API_KEY
          require_env_name LIVEKIT_API_SECRET
          require_env_name LIVEKIT_AGENT_NAME
          require_env_name OPENAI_API_KEY
          require_env_name OPENAI_REALTIME_VOICE

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f docker-compose.hetzner.yml config >/dev/null
          docker compose -f docker-compose.hetzner.yml pull
          docker compose -f docker-compose.hetzner.yml up -d
          docker compose -f docker-compose.hetzner.yml ps
          docker image prune -f
          REMOTE_SCRIPT
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}
          HETZNER_DOMAIN: ${{ secrets.HETZNER_DOMAIN }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
          CADDY_BASIC_AUTH_USER: ${{ secrets.CADDY_BASIC_AUTH_USER }}
          CADDY_BASIC_AUTH_HASH: ${{ secrets.CADDY_BASIC_AUTH_HASH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public site
        run: |
          set -euo pipefail
          normalize_domain() {
            printf '%s' "$1" | tr -d '\r\n\t ' | sed -E 's#^https?://##; s#/$##'
          }

          DOMAIN="$(normalize_domain "${HETZNER_DOMAIN}")"
          if [ -z "${DOMAIN}" ]; then
            echo "HETZNER_DOMAIN is empty after normalization"
            exit 1
          fi

          SITE_URL="https://${DOMAIN}"
          HEALTH_URL="${SITE_URL}/healthz"
          for attempt in 1 2 3 4 5; do
            unauth_status="$(curl -sS -o /dev/null -w "%{http_code}" "${SITE_URL}")"
            if [ "${unauth_status}" = "401" ] \
              && curl -fsSI -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${SITE_URL}" >/dev/null \
              && curl -fsS -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${HEALTH_URL}" | grep -q '"livekitConfigured":true'; then
              curl -fsSI -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${SITE_URL}" | sed -n '1,12p'
              curl -fsS -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${HEALTH_URL}"
              exit 0
            fi

            echo "Site, auth, or voice API is not ready yet, retrying in 10 seconds (${attempt}/5)..."
            sleep 10
          done

          curl -fsSI -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${SITE_URL}"
          curl -fsS -u "${CADDY_BASIC_AUTH_USER}:${CADDY_BASIC_AUTH_PASSWORD}" "${HEALTH_URL}"
        env:
          HETZNER_DOMAIN: ${{ secrets.HETZNER_DOMAIN }}
          CADDY_BASIC_AUTH_USER: ${{ secrets.CADDY_BASIC_AUTH_USER }}
          CADDY_BASIC_AUTH_PASSWORD: ${{ secrets.CADDY_BASIC_AUTH_PASSWORD }}

  run-ai-zendesk-agent:
    if: ${{ inputs.operation == 'run_ai_zendesk_agent' }}
    runs-on: ubuntu-latest
    env:
      HETZNER_USER: deploy
      HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}
      LEGEND_AGENT_ROOT: /opt/legend/ai-zendesk-agent
      LEGEND_AGENT_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout agent branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.agent_branch }}

      - name: Validate agent inputs
        run: |
          set -euo pipefail
          if [ "${MODE}" != "triage" ]; then
            echo "Only triage mode is supported."
            exit 1
          fi
          if ! [[ "${MAX_STEPS}" =~ ^[0-9]+$ ]] || [ "${MAX_STEPS}" -lt 1 ] || [ "${MAX_STEPS}" -gt 20 ]; then
            echo "agent_max_steps must be an integer from 1 to 20."
            exit 1
          fi
        env:
          MODE: ${{ inputs.agent_mode }}
          MAX_STEPS: ${{ inputs.agent_max_steps }}

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keygen -lf ~/.ssh/hetzner_deploy
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Prepare agent files on Hetzner
        run: |
          set -euo pipefail
          OPENAI_MODEL_VALUE="${INPUT_MODEL:-${OPENAI_MODEL_SECRET:-gpt-5.5}}"

          mkdir -p "${RUNNER_TEMP}/legend-ai"
          {
            printf 'OPENAI_MODEL=%s\n' "${OPENAI_MODEL_VALUE}"
          } > "${RUNNER_TEMP}/legend-ai/legend-ai-zendesk-agent.env"

          {
            printf 'LEGEND_AGENT_BRANCH=%q\n' "${INPUT_BRANCH}"
            printf 'LEGEND_AGENT_BASE_URL=%q\n' "${INPUT_BASE_URL}"
            printf 'LEGEND_AGENT_MODE=%q\n' "${INPUT_MODE}"
            printf 'LEGEND_AGENT_MODEL=%q\n' "${OPENAI_MODEL_VALUE}"
            printf 'LEGEND_AGENT_MAX_STEPS=%q\n' "${INPUT_MAX_STEPS}"
            printf 'LEGEND_AGENT_RUN_ID=%q\n' "${LEGEND_AGENT_RUN_ID}"
            printf 'LEGEND_AGENT_ROOT=%q\n' "${LEGEND_AGENT_ROOT}"
            printf 'LEGEND_AGENT_SOURCE_TGZ=%q\n' "${LEGEND_AGENT_ROOT}/source/${LEGEND_AGENT_RUN_ID}.tar.gz"
          } > "${RUNNER_TEMP}/legend-ai/run.env"

          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./.legend-ai-audits' \
            --exclude='./.env' \
            --exclude='./.env.local' \
            --exclude='./.env.*.local' \
            -czf "${RUNNER_TEMP}/legend-ai/source.tar.gz" .

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "mkdir -p '${LEGEND_AGENT_ROOT}/bin' '${LEGEND_AGENT_ROOT}/env' '${LEGEND_AGENT_ROOT}/runs' '${LEGEND_AGENT_ROOT}/logs' '${LEGEND_AGENT_ROOT}/source'"

          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            ops/hetzner/run-ai-zendesk-agent.sh \
            "${RUNNER_TEMP}/legend-ai/legend-ai-zendesk-agent.env" \
            "${RUNNER_TEMP}/legend-ai/run.env" \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/env/"

          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${RUNNER_TEMP}/legend-ai/source.tar.gz" \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/source/${LEGEND_AGENT_RUN_ID}.tar.gz"

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "mv '${LEGEND_AGENT_ROOT}/env/run-ai-zendesk-agent.sh' '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh' && chmod 700 '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh' && chmod 600 '${LEGEND_AGENT_ROOT}/env/legend-ai-zendesk-agent.env' '${LEGEND_AGENT_ROOT}/env/run.env'"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          INPUT_BRANCH: ${{ inputs.agent_branch }}
          INPUT_BASE_URL: ${{ inputs.agent_base_url }}
          INPUT_MODE: ${{ inputs.agent_mode }}
          INPUT_MODEL: ${{ inputs.agent_model }}
          INPUT_MAX_STEPS: ${{ inputs.agent_max_steps }}
          OPENAI_MODEL_SECRET: ${{ secrets.OPENAI_MODEL }}

      - name: Run agent on Hetzner
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "set -a && . '${LEGEND_AGENT_ROOT}/env/run.env' && set +a && '${LEGEND_AGENT_ROOT}/bin/run-ai-zendesk-agent.sh'"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}

      - name: Download agent report artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/legend-ai-result"
          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}:${LEGEND_AGENT_ROOT}/runs/${LEGEND_AGENT_RUN_ID}.tar.gz" \
            "${RUNNER_TEMP}/legend-ai-result/latest-ai-run.tar.gz"
          tar -xzf "${RUNNER_TEMP}/legend-ai-result/latest-ai-run.tar.gz" -C "${RUNNER_TEMP}/legend-ai-result"
          {
            echo "## Legend AI Zendesk Agent"
            echo
            cat "${RUNNER_TEMP}/legend-ai-result/latest-ai-summary.md"
            echo
            echo "Full report artifact: latest-ai-report"
            echo "Hetzner run directory: ${LEGEND_AGENT_ROOT}/runs/${LEGEND_AGENT_RUN_ID}"
            echo "Hetzner log: ${LEGEND_AGENT_ROOT}/logs/${LEGEND_AGENT_RUN_ID}.log"
          } >> "${GITHUB_STEP_SUMMARY}"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}

      - name: Upload agent report artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-ai-report
          path: ${{ runner.temp }}/legend-ai-result
          retention-days: 14

  voice-debug:
    if: ${{ inputs.operation == 'voice_debug' }}
    runs-on: ubuntu-latest
    env:
      HETZNER_USER: deploy
      HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}
    steps:
      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keygen -lf ~/.ssh/hetzner_deploy
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Collect voice diagnostics
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/legend

          echo "== docker compose ps =="
          docker compose -f docker-compose.hetzner.yml ps

          echo
          echo "== voice env presence =="
          docker exec legend-voice-agent sh -lc '
            test -n "$LIVEKIT_URL" && echo "LIVEKIT_URL=set" || echo "LIVEKIT_URL=missing"
            test -n "$LIVEKIT_API_KEY" && echo "LIVEKIT_API_KEY=set" || echo "LIVEKIT_API_KEY=missing"
            test -n "$LIVEKIT_API_SECRET" && echo "LIVEKIT_API_SECRET=set" || echo "LIVEKIT_API_SECRET=missing"
            test -n "$OPENAI_API_KEY" && echo "OPENAI_API_KEY=set" || echo "OPENAI_API_KEY=missing"
            printf "LIVEKIT_AGENT_NAME=%s\n" "${LIVEKIT_AGENT_NAME:-}"
            printf "OPENAI_REALTIME_VOICE=%s\n" "${OPENAI_REALTIME_VOICE:-}"
          '

          echo
          echo "== voice-api health =="
          docker exec legend-voice-api sh -lc \
            'node -e "fetch(\"http://127.0.0.1:8787/healthz\").then(r=>r.text()).then(console.log)"'

          echo
          echo "== voice-api end self-test =="
          docker exec legend-voice-api sh -lc \
            'node -e "fetch(\"http://127.0.0.1:8787/api/voice-sessions/end\", {method:\"POST\", headers:{\"content-type\":\"application/json\"}, body:JSON.stringify({roomName:\"legend-debug-nonexistent\"})}).then(async r=>{ console.log(r.status); console.log(await r.text()) }).catch((error)=>{ console.error(error); process.exit(1) })"'

          echo
          echo "== legend-voice-api logs =="
          docker logs legend-voice-api --tail 120

          echo
          echo "== legend-voice-agent logs =="
          docker logs legend-voice-agent --tail 220
          REMOTE_SCRIPT
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
