name: Deploy to Hetzner

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: hetzner
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/annahrunova/legend-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keygen -lf ~/.ssh/hetzner_deploy
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Verify SSH access
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            'whoami && mkdir -p /opt/legend'
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}

      - name: Copy compose file to server
        run: |
          set -euo pipefail
          scp -i ~/.ssh/hetzner_deploy \
            -P "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.hetzner.yml \
            "${HETZNER_USER}@${HETZNER_HOST}:/opt/legend/docker-compose.hetzner.yml"
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}

      - name: Deploy on server
        run: |
          set -euo pipefail
          normalize_domain() {
            printf '%s' "$1" | tr -d '\r\n\t ' | sed -E 's#^https?://##; s#/$##'
          }

          HETZNER_DOMAIN_CLEAN="$(normalize_domain "${HETZNER_DOMAIN}")"
          if [ -z "${HETZNER_DOMAIN_CLEAN}" ]; then
            echo "HETZNER_DOMAIN is empty after normalization"
            exit 1
          fi

          ssh -i ~/.ssh/hetzner_deploy \
            -p "${HETZNER_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${HETZNER_USER}@${HETZNER_HOST}" \
            "HETZNER_DOMAIN='${HETZNER_DOMAIN_CLEAN}' CADDY_EMAIL='${CADDY_EMAIL}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/legend
          printf 'HETZNER_DOMAIN=%s\nCADDY_EMAIL=%s\n' "$HETZNER_DOMAIN" "$CADDY_EMAIL" > .env
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f docker-compose.hetzner.yml pull
          docker compose -f docker-compose.hetzner.yml up -d
          docker image prune -f
          REMOTE_SCRIPT
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: deploy
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || 22 }}
          HETZNER_DOMAIN: ${{ secrets.HETZNER_DOMAIN }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public site
        run: |
          set -euo pipefail
          normalize_domain() {
            printf '%s' "$1" | tr -d '\r\n\t ' | sed -E 's#^https?://##; s#/$##'
          }

          DOMAIN="$(normalize_domain "${HETZNER_DOMAIN}")"
          if [ -z "${DOMAIN}" ]; then
            echo "HETZNER_DOMAIN is empty after normalization"
            exit 1
          fi

          SITE_URL="https://${DOMAIN}"
          for attempt in 1 2 3 4 5; do
            if curl -fsSI "${SITE_URL}" >/dev/null; then
              curl -fsSI "${SITE_URL}" | sed -n '1,12p'
              exit 0
            fi

            echo "Site is not ready yet, retrying in 10 seconds (${attempt}/5)..."
            sleep 10
          done

          curl -fsSI "${SITE_URL}"
        env:
          HETZNER_DOMAIN: ${{ secrets.HETZNER_DOMAIN }}
