name: Deploy to Hetzner

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: hetzner
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/annahrunova/legend-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          source: docker-compose.hetzner.yml
          target: /opt/legend

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          HETZNER_DOMAIN: ${{ secrets.HETZNER_DOMAIN }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          envs: HETZNER_DOMAIN,CADDY_EMAIL,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            mkdir -p /opt/legend
            cd /opt/legend
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            HETZNER_DOMAIN="$HETZNER_DOMAIN" \
            CADDY_EMAIL="$CADDY_EMAIL" \
              docker compose -f docker-compose.hetzner.yml pull
            HETZNER_DOMAIN="$HETZNER_DOMAIN" \
            CADDY_EMAIL="$CADDY_EMAIL" \
              docker compose -f docker-compose.hetzner.yml up -d
            docker image prune -f
